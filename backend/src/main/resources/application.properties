spring.application.name=backend

# Database Configuration
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/backend_academy}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=true

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0

# JWT Configuration (256-bit hex key by default)
jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}

# Server Port
server.port=${PORT:8081}

# Default Admin Setup via Flyway Placeholders
# These MUST be provided via environment variables (e.g. in a .env file)
spring.flyway.placeholders.admin_email=${ADMIN_EMAIL}
spring.flyway.placeholders.admin_password_hash=${ADMIN_PASSWORD_HASH}
